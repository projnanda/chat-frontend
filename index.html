<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NANDA Agentic Chat</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
</head>
<body>
    <div class="app-container">
        <div class="agents-panel">
            <h2>NANDA Agents</h2>
            <!-- Agent list will be dynamically populated from the registry -->
            <div class="agent-list" id="agent-list">
                <!-- Loading indicator -->
                <div class="loading-agents">
                    <i class="fas fa-circle-notch fa-spin"></i>
                    <span>Loading agents...</span>
                </div>
            </div>
            
            <div class="product-branding">
                <h3>NANDA<span class="accent">.</span></h3>
                <p>Agentic Chat Platform</p>
            </div>
        </div>
        <div class="chat-container">
            <div class="chat-header">
                <div class="avatar">
                    <i class="fas fa-robot"></i>
                </div>
                <div class="title">
                    <h1>Loading...</h1>
                    <p>Connecting to agents</p>
                </div>
            </div>
            <div class="chat-messages" id="chat-messages">
                <div class="message bot-message">
                    <div class="message-content">
                        <p>Connecting to NANDA registry...</p>
                    </div>
                </div>
            </div>
            <div class="chat-input">
                <input type="text" id="user-input" placeholder="Type your message here...">
                <button id="send-button">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>
    
    <!-- Using ES modules instead of script.js -->
    <script type="module" src="main.js"></script>
</body>
</html>
